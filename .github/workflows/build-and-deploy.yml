name: Build and Deploy
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' && inputs.skip_tests &&
    format('Build and Deploy (UNVALIDATED hotfix) · {0}', github.ref_name) ||
    format('Build and Deploy · {0}', github.ref_name)
  }}

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip unit and instrumented tests for a hotfix build
        required: false
        default: false
        type: boolean

jobs:
  unit_tests:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_tests }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK API 33
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses and install packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "platforms;android-29" \
            "build-tools;33.0.2" \
            "emulator" \
            "system-images;android-29;default;x86_64"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload unit test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: krestykimi-unit-test-reports
          path: |
            app/build/reports/tests
            app/build/test-results
          if-no-files-found: warn

  instrumented_tests:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_tests }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK API 33
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses and install packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run instrumented tests on API 29 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_4
          script: bash .github/scripts/run-emulator-tests.sh

      - name: Upload instrumentation diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: krestykimi-test-diagnostics
          path: |
            ci-artifacts
            app/build/reports/androidTests
            app/build/outputs/androidTest-results
          if-no-files-found: warn

  build_apk:
    needs:
      - unit_tests
      - instrumented_tests
    if: >-
      ${{
        always() &&
        (needs.unit_tests.result == 'success' || needs.unit_tests.result == 'skipped') &&
        (needs.instrumented_tests.result == 'success' || needs.instrumented_tests.result == 'skipped')
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK API 33
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses and install packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build APK
        id: build_apk
        shell: bash
        run: |
          set -euo pipefail

          apksigner_path="$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools" -type f -name apksigner | sort | tail -n 1)"
          keystore_path="app/signing/krestykimi-release.jks"
          expected_cert_sha256="$(
            keytool -list -v \
              -keystore "${keystore_path}" \
              -storepass "${KRESTYKIMI_RELEASE_STORE_PASSWORD:-krestykimi-release}" \
              | sed -n 's/^[[:space:]]*SHA256: //p' \
              | head -n 1
          )"

          if [[ -z "${expected_cert_sha256}" ]]; then
            echo "Failed to read signing certificate fingerprint from ${keystore_path}."
            exit 1
          fi

          ./gradlew assembleRelease

          release_apk="app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "${release_apk}" ]]; then
            echo "Signed release APK was not produced at ${release_apk}."
            exit 1
          fi

          if ! "${apksigner_path}" verify --print-certs "${release_apk}" >/dev/null 2>&1; then
            echo "Release APK failed apksigner verification."
            exit 1
          fi

          apk_cert_sha256="$(
            "${apksigner_path}" verify --print-certs "${release_apk}" 2>/dev/null \
              | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' \
              | head -n 1
          )"

          if [[ -z "${apk_cert_sha256}" || "${apk_cert_sha256}" != "${expected_cert_sha256}" ]]; then
            echo "Release APK certificate does not match ${keystore_path}."
            exit 1
          fi

          echo "variant=release" >> "$GITHUB_OUTPUT"
          echo "apk_path=${release_apk}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: krestykimi-apk
          path: ${{ steps.build_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Send APK to Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          BUILD_VARIANT: ${{ steps.build_apk.outputs.variant }}
          APK_PATH: ${{ steps.build_apk.outputs.apk_path }}
          SKIP_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_tests }}
        run: |
          set -euo pipefail
          if [[ -z "${TELEGRAM_BOT_TOKEN}" || -z "${TELEGRAM_CHAT_ID}" ]]; then
            echo "Telegram secrets are not configured; skipping delivery."
            exit 0
          fi
          if [[ -z "${APK_PATH}" || ! -f "${APK_PATH}" ]]; then
            echo "No application APK found for Telegram delivery."
            exit 1
          fi
          if [[ "${SKIP_TESTS}" == "true" ]]; then
            status="unvalidated (tests skipped)"
          else
            status="success"
          fi
          caption="KrestyKimi build status: ${status}%0AVariant: ${BUILD_VARIANT}%0ACommit: ${COMMIT_SHA}"
          curl --fail --silent --show-error \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "caption=${caption}" \
            -F "document=@${APK_PATH}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"

  mark_unvalidated:
    needs:
      - build_apk
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_tests }}
    runs-on: ubuntu-latest

    steps:
      - name: Mark skipped-tests build as unvalidated
        run: |
          echo "::error::This hotfix build skipped unit and instrumented tests. Artifact delivery is allowed, but the workflow must not be treated as a passing validation run."
          exit 1
