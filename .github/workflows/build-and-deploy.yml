name: Build and Deploy
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' && inputs.skip_tests &&
    format('Build and Deploy (UNVALIDATED hotfix) · {0}', github.ref_name) ||
    format('Build and Deploy · {0}', github.ref_name)
  }}

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip unit and instrumented tests for a hotfix build
        required: false
        default: false
        type: boolean

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK API 33
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses and install packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_tests }}
        run: ./gradlew test

      - name: Run instrumented tests on API 29 emulator
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_tests }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_4
          script: >-
            set -eu;
            ./gradlew assembleDebug assembleDebugAndroidTest;
            adb install -r app/build/outputs/apk/debug/app-debug.apk;
            adb install -r app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk;
            adb shell am instrument --user 0 -w -e notClass com.kresty.isolation.activities.ManagedProfileFlowTest com.kresty.isolation.test/androidx.test.runner.AndroidJUnitRunner | tee /tmp/pretests.log;
            grep -q 'OK (' /tmp/pretests.log;
            ! grep -q 'FAILURES!!!' /tmp/pretests.log;
            profile_output="$(adb shell pm create-user --profileOf 0 --managed 'Kresty Test' | tr -d '\r')";
            profile_id="$(printf '%s\n' "$profile_output" | sed -n 's/.*id \([0-9][0-9]*\).*/\1/p')";
            if [ -z "$profile_id" ]; then echo "Failed to create managed profile"; echo "$profile_output"; exit 1; fi;
            adb shell am start-user -w "$profile_id";
            adb shell pm install-existing --user "$profile_id" com.kresty.isolation;
            adb shell dpm set-profile-owner --user "$profile_id" 'com.kresty.isolation/.receivers.KrestyDeviceAdminReceiver';
            adb shell am broadcast --user "$profile_id" -a android.app.action.PROFILE_PROVISIONING_COMPLETE -n com.kresty.isolation/.receivers.KrestyDeviceAdminReceiver;
            adb shell pm list users | grep -F "$profile_id";
            adb shell dumpsys device_policy | grep -F "com.kresty.isolation/.receivers.KrestyDeviceAdminReceiver";
            adb shell am instrument --user 0 -w -e class com.kresty.isolation.activities.ManagedProfileFlowTest com.kresty.isolation.test/androidx.test.runner.AndroidJUnitRunner | tee /tmp/managed-profile.log;
            grep -q 'OK (' /tmp/managed-profile.log;
            ! grep -q 'FAILURES!!!' /tmp/managed-profile.log

      - name: Build APK
        id: build_apk
        shell: bash
        run: |
          set -euo pipefail

          apksigner_path="$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools" -type f -name apksigner | sort | tail -n 1)"
          keystore_path="app/signing/krestykimi-release.jks"
          expected_cert_sha256="$(
            keytool -list -v \
              -keystore "${keystore_path}" \
              -storepass "${KRESTYKIMI_RELEASE_STORE_PASSWORD:-krestykimi-release}" \
              | sed -n 's/^[[:space:]]*SHA256: //p' \
              | head -n 1
          )"

          if [[ -z "${expected_cert_sha256}" ]]; then
            echo "Failed to read signing certificate fingerprint from ${keystore_path}."
            exit 1
          fi

          ./gradlew assembleRelease

          release_apk="app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "${release_apk}" ]]; then
            echo "Signed release APK was not produced at ${release_apk}."
            exit 1
          fi

          if ! "${apksigner_path}" verify --print-certs "${release_apk}" >/dev/null 2>&1; then
            echo "Release APK failed apksigner verification."
            exit 1
          fi

          apk_cert_sha256="$(
            "${apksigner_path}" verify --print-certs "${release_apk}" 2>/dev/null \
              | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' \
              | head -n 1
          )"

          if [[ -z "${apk_cert_sha256}" || "${apk_cert_sha256}" != "${expected_cert_sha256}" ]]; then
            echo "Release APK certificate does not match ${keystore_path}."
            exit 1
          fi

          echo "variant=release" >> "$GITHUB_OUTPUT"
          echo "apk_path=${release_apk}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: krestykimi-apk
          path: ${{ steps.build_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Send APK to Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          BUILD_VARIANT: ${{ steps.build_apk.outputs.variant }}
          APK_PATH: ${{ steps.build_apk.outputs.apk_path }}
          SKIP_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_tests }}
        run: |
          set -euo pipefail
          if [[ -z "${TELEGRAM_BOT_TOKEN}" || -z "${TELEGRAM_CHAT_ID}" ]]; then
            echo "Telegram secrets are not configured; skipping delivery."
            exit 0
          fi
          if [[ -z "${APK_PATH}" || ! -f "${APK_PATH}" ]]; then
            echo "No application APK found for Telegram delivery."
            exit 1
          fi
          if [[ "${SKIP_TESTS}" == "true" ]]; then
            status="unvalidated (tests skipped)"
          else
            status="success"
          fi
          caption="KrestyKimi build status: ${status}%0AVariant: ${BUILD_VARIANT}%0ACommit: ${COMMIT_SHA}"
          curl --fail --silent --show-error \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "caption=${caption}" \
            -F "document=@${APK_PATH}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"

      - name: Mark skipped-tests build as unvalidated
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_tests }}
        run: |
          echo "::error::This hotfix build skipped unit and instrumented tests. Artifact delivery is allowed, but the workflow must not be treated as a passing validation run."
          exit 1
