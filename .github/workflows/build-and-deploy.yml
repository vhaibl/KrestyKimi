name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip unit and instrumented tests for a hotfix build
        required: false
        default: false
        type: boolean

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK API 33
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses and install packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_tests }}
        run: ./gradlew test

      - name: Run instrumented tests on API 29 emulator
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_tests }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_4
          script: |
            ./gradlew assembleDebug assembleDebugAndroidTest
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb install -r app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
            adb shell am instrument -w \
              -e notClass com.kresty.isolation.activities.ManagedProfileFlowTest \
              com.kresty.isolation.test/androidx.test.runner.AndroidJUnitRunner

            profile_output="$(adb shell pm create-user --profileOf 0 --managed 'Kresty Test' | tr -d '\r')"
            profile_id="$(printf '%s\n' "$profile_output" | sed -n 's/.*id \([0-9][0-9]*\).*/\1/p')"
            if [ -z "$profile_id" ]; then
              echo "Failed to create managed profile"
              echo "$profile_output"
              exit 1
            fi

            adb shell am start-user -w "$profile_id"
            adb shell pm install-existing --user "$profile_id" com.kresty.isolation
            adb shell dpm set-profile-owner --user "$profile_id" 'com.kresty.isolation/.receivers.KrestyDeviceAdminReceiver'
            adb shell am broadcast --user "$profile_id" \
              -a android.app.action.PROFILE_PROVISIONING_COMPLETE \
              -n com.kresty.isolation/.receivers.KrestyDeviceAdminReceiver

            adb shell am instrument -w \
              -e class com.kresty.isolation.activities.ManagedProfileFlowTest \
              com.kresty.isolation.test/androidx.test.runner.AndroidJUnitRunner

      - name: Build APK
        id: build_apk
        shell: bash
        run: |
          set -euo pipefail

          apksigner_path="$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools" -type f -name apksigner | sort | tail -n 1)"

          if ./gradlew assembleRelease; then
            release_apk="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name 'app-release*.apk' | sort | head -n 1 || true)"
            if [[ -n "${release_apk}" && -f "${release_apk}" ]] && "${apksigner_path}" verify --print-certs "${release_apk}" >/dev/null 2>&1; then
              echo "variant=release" >> "$GITHUB_OUTPUT"
              echo "apk_path=${release_apk}" >> "$GITHUB_OUTPUT"
            else
              echo "Release APK is missing or unsigned; falling back to debug APK."
              ./gradlew assembleDebug
              debug_apk="$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name 'app-debug*.apk' ! -name '*androidTest*' | sort | head -n 1)"
              echo "variant=debug" >> "$GITHUB_OUTPUT"
              echo "apk_path=${debug_apk}" >> "$GITHUB_OUTPUT"
            fi
          else
            ./gradlew assembleDebug
            debug_apk="$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name 'app-debug*.apk' ! -name '*androidTest*' | sort | head -n 1)"
            echo "variant=debug" >> "$GITHUB_OUTPUT"
            echo "apk_path=${debug_apk}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: krestykimi-apk
          path: ${{ steps.build_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Send APK to Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          BUILD_VARIANT: ${{ steps.build_apk.outputs.variant }}
          APK_PATH: ${{ steps.build_apk.outputs.apk_path }}
        run: |
          set -euo pipefail
          if [[ -z "${TELEGRAM_BOT_TOKEN}" || -z "${TELEGRAM_CHAT_ID}" ]]; then
            echo "Telegram secrets are not configured; skipping delivery."
            exit 0
          fi
          if [[ -z "${APK_PATH}" || ! -f "${APK_PATH}" ]]; then
            echo "No application APK found for Telegram delivery."
            exit 1
          fi
          caption="KrestyKimi build status: success%0AVariant: ${BUILD_VARIANT}%0ACommit: ${COMMIT_SHA}"
          curl --fail --silent --show-error \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "caption=${caption}" \
            -F "document=@${APK_PATH}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"
